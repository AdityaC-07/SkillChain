version: '3.8'
services:
  backend:
    build: .
    ports:
      - '8000:8000'
    env_file: .env
    depends_on:
      - mongodb
    volumes:
      - ./app/contracts:/app/app/contracts

  mongodb:
    image: mongo:7.0
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: skillchain

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - '5173:5173'
    volumes:
      - ./skillchain-frontend:/app
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  mongodb_data:
